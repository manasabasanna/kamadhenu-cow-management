{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center" style="min-height: 80vh; align-items: center;">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header text-center py-4">
                <i class="fas fa-cow fa-3x" style="color: #DAA520;"></i>
                <h2 class="kannada-text mt-2" style="font-size: 2rem;">ಕಾಮಧೇನು</h2>
                <h5 class="mt-2">Kamadhenu - Herd Management</h5>
                <p class="text-muted">Login to access your divine herd</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user"></i> Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="Enter username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    New user? <a href="{{ url_for('register') }}">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
