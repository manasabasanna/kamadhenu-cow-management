{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Cow: {{ cow.name }}</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Cow Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ cow.name }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="ear_tag" class="form-label">Ear Tag/ID *</label>
                            <input type="text" class="form-control" id="ear_tag" name="ear_tag" value="{{ cow.ear_tag }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth *</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ cow.date_of_birth }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="breed" class="form-label">Breed</label>
                            <select class="form-select" id="breed" name="breed">
                                <option value="">Select Breed</option>
                                <option {% if cow.breed == 'Holstein' %}selected{% endif %}>Holstein</option>
                                <option {% if cow.breed == 'Jersey' %}selected{% endif %}>Jersey</option>
                                <option {% if cow.breed == 'Brown Swiss' %}selected{% endif %}>Brown Swiss</option>
                                <option {% if cow.breed == 'Guernsey' %}selected{% endif %}>Guernsey</option>
                                <option {% if cow.breed == 'Ayrshire' %}selected{% endif %}>Ayrshire</option>
                                <option {% if cow.breed == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        
                        <div class="col-12 mb-3">
                            <label for="photo" class="form-label">Change Photo</label>
                            {% if cow.photo_url %}
                                <div class="mb-2">
                                    <img src="{{ cow.photo_url }}" alt="{{ cow.name }}" style="height: 100px; border-radius: 10px;">
                                    <p class="text-muted small mt-1">Current photo</p>
                                </div>
                            {% endif %}
                            <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                            <small class="text-muted">Leave empty to keep current photo</small>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('cow_detail', cow_id=cow.id) }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Cow
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
