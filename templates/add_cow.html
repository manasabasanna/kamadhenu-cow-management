{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Add New Cow</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Cow Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="ear_tag" class="form-label">Ear Tag/ID *</label>
                            <input type="text" class="form-control" id="ear_tag" name="ear_tag" required>
                            <small class="text-muted">Unique identification number</small>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth *</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="breed" class="form-label">Breed</label>
                            <select class="form-select" id="breed" name="breed">
                                <option value="">Select Breed</option>
                                <option>Holstein</option>
                                <option>Jersey</option>
                                <option>Brown Swiss</option>
                                <option>Guernsey</option>
                                <option>Ayrshire</option>
                                <option>Other</option>
                            </select>
                        </div>
                        
                        <div class="col-12 mb-3">
                            <label for="photo" class="form-label">Photo</label>
                            <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                            <small class="text-muted">Upload a clear photo of the cow</small>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Add Cow
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
